<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro | Scrum Quest</title>
</head>

<header></header>

<body>
  <main>
    <div class="conteudo">
      <form id="formCadastro" class="form_cad_or_login">
        <p>
          Antes de iniciar sua nova jornada, precisamos de algumas informações
          para criar sua ficha de aventureiro. Insira as informações abaixo e
          prossiga!
        </p>
        <!-- caixas para cadastro do nome do personagem -->
        <label for="cad_username">Nome do personagem</label>
        <input type="text" name="cad_username" id="cad_username" />

        <!-- caixas para cadastro do CPF do usuário **CHAVE PRIMARIA** -->
        <label for="cad_CPF">CPF</label>
        <input type="text" name="cad_CPF" id="cad_CPF" />

        <!-- caixas para cadastro do nome do usuário -->
        <label for="cad_nome_completo">Nome completo</label>
        <input type="text" name="cad_nome_completo" id="cad_nome_completo" />

        <!-- caixas para cadastro do e-mail -->
        <label for="cad_email">E-mail</label>
        <input type="text" name="cad_email" id="cad_email" />

        <!-- caixas para cadastro da senha -->
        <label for="cad_senha">Senha</label>
        <input type="text" name="cad_senha" id="cad_senha" />

        <!-- botões para fazer login ou retornar à pagina principal -->
        <label for="cad_confirm_senha">Confirmar senha</label>
        <input type="text" name="cad_confirm_senha" id="cad_confirm_senha" />

        <button class="button_voltar" id="voltar_inicio">Retornar</button>
        <button type="submit" class="button_login_cadastro" id="cadastrar_novo_user">Prosseguir</button>
      </form>
    </div>
  </main>
  <script>
    document
      .getElementById("formCadastro")
      .addEventListener("submit", async function (e) {
        e.preventDefault();

        const nome = document.getElementById("cad_nome_completo").value;
        const cpf = document.getElementById("cad_CPF").value;
        const email = document.getElementById("cad_email").value;
        const senha = document.getElementById("cad_senha").value;
        const confirmarSenha = document.getElementById("cad_confirm_senha").value;

        // validação básica
        if (senha !== confirmarSenha) {
          alert("As senhas não coincidem!");
          return;
        }

        try {
          const response = await fetch("/api/usuarios", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nome,
              cpf,
              email,
              senha,
            }),
          });

          const data = await response.json();

          if (response.ok) {
            alert("Cadastro realizado com sucesso!");

            // REDIRECIONA
            window.location.href = "/capitulo1.html";
          } else {
            alert(data.message);
          }

        } catch (error) {
          console.error(error);
          alert("Erro ao conectar com o servidor");
        }
      });
  </script>
</body>

<footer></footer>

</html>
