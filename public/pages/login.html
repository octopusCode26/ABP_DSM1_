<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <title>Login | Scrum Quest</title>
  </head>

  <header></header>

  <body>
    <main>
      <div class="conteudo">
        <form action="" class="form_cad_or_login">
          <p>
            Como é bom tê-lo de volta, seja bem-vindo! Cuidei de suas tarefas
            durante sua ausência. Deseja retoma-las?
          </p>
          <!-- caixas para cadastro do CPF do usuário **CHAVE PRIMARIA** -->
          <label for="login_cpf">CPF</label>
          <input type="text" name="login_cpf" id="login_cpf" />

          <!-- caixas para cadastro do nome do personagem -->
          <label for="login_senha">Senha</label>
          <input type="text" name="login_senha" id="login_senha" />

          <!-- botões para fazer login ou retornar à pagina principal -->
          <button class="button_voltar" id="voltar_inicio">Retornar</button>
          <button class="button_login_cadastro" id="fazer_login_user">Retomar Jornada</button>
        </form>
      </div>
    </main>
  </body>

  <footer></footer>
</html>
