<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/questionario1.css" />
    <title>Questionário 1 | Scrum Dungeon</title>
  </head>

  <body class="corpo-questionario">
    <!-- CABEÇALHO -->
    <header>
      <div class="header_conteudo">
        <img
          src="../assets/img/logo_scrum_simples.png"
          alt="Logo do Scrum Quest"
          class="logo_header"
        />
        <button
          class="menu_toggle"
          id="menuToggle"
          aria-label="Abrir menu"
          aria-expanded="false"
          aria-controls="menuPrincipal"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav_header" id="menuPrincipal">
          <ul>
            <li><a href="./index.html">Início</a></li>
            <li><a href="./index.html">Sobre</a></li>
            <li><a href="./index.html">Contato</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="tela">
      <!-- Barra de progresso -->
<div class="progresso-box">
        <h2 id="texto-progresso">QUESTÃO  DE </h2>
        
        <div class="barra-container">
            <div id="progresso-dinamico" class="barra-preenchimento" style="width: 10%;"></div>
        </div>
    </div>
    <script src="../assets/js/questionario1.js"></script>  

      <!-- Caixa de Questão -->
      <div class="questao-box">
        <p class="dificuldade">Dificuldade</p>
        <div class="linha"></div>
        <p class="questao">Qual artefato representa o resultado de uma Sprint?</p>
      </div>

      <!-- "Selecione sua resposta" -->
      <div>
        <p class="selecione">Selecione a alternativa correta</p>
      </div>

      <!-- Respostas -->
      <div class="respostas">

        <button class="botaoresposta">
          <div class="quadradinho">
            <p class="letraresposta">A</p>
          </div>
          <p class="resposta">Resposta A</p>
        </button>

        <button class="botaoresposta">
          <div class="quadradinho">
            <p class="letraresposta">B</p>
          </div>
          <p class="resposta">Resposta B</p>
        </button>

        <button class="botaoresposta">
          <div class="quadradinho">
            <p class="letraresposta">C</p>
          </div>
          <p class="resposta">Resposta C</p>
        </button>

        <button class="botaoresposta">
          <div class="quadradinho">
            <p class="letraresposta">D</p>
          </div>
          <p class="resposta">Resposta D</p>
        </button>

      </div>

      <!-- botões de navegação -->
      <div class="botoesdenavegacao">
        <button class="botaonavegacao">Voltar</button>
        <button class="botaonavegacao">Pular</button>
        <button class="confirmar">CONFIRMAR RESPOSTA</button>
        <button class="botaonavegacao">Enviar</button>
      </div>
    </div>

     
    <!-- RODAPÉ -->
    <footer>
      <div class="footer_conteudo">
        <p>© 2026 Scrum Dungeon - Todos os direitos reservados.</p>
        <img
          src="../assets/img/logo_grupo_octopuscode.png"
          alt="Logo do Grupo OctopusCode"
          class="logo_footer"
        />
        <p>< OCTOPUS_CODE ></p>
      </div>
    </footer>
  </body>
</html>
